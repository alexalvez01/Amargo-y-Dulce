<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="50" />
    </clipPath>
  </defs>

  <!-- Mitad derecha: Crema/Chocolate blanco -->
  <rect x="50" y="0" width="50" height="100" fill="#E6C280" clip-path="url(#circle-clip)" />

  <!-- Mitad izquierda: Marrón oscuro mate -->
  <rect x="0" y="0" width="50" height="100" fill="#3E2723" clip-path="url(#circle-clip)" />

  <!-- Letra A (Mitad izquierda) -->
  <text x="25" y="53" font-family="Arial, sans-serif" font-weight="bold" font-size="40" fill="#E6C280" text-anchor="middle" dominant-baseline="central">A</text>

  <!-- Letra D (Mitad derecha) -->
  <text x="75" y="53" font-family="Arial, sans-serif" font-weight="bold" font-size="40" fill="#3E2723" text-anchor="middle" dominant-baseline="central">D</text>

  <!-- Símbolo & (Centro superior) -->
  <text x="50" y="22" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">&amp;</text>
</svg>
